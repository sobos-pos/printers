<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Soboss{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      /* Palette */
      --bg: #06070d;
      --bg-gradient: radial-gradient(circle at 50% 0%, #111326 0%, #06070d 70%);
      --surface: rgba(15, 18, 30, 0.75);
      --surface-elevated: rgba(22, 27, 45, 0.9);
      --surface-opaque: #0c0f1d;
      --border: rgba(255, 255, 255, 0.08);
      --border-light: rgba(255, 255, 255, 0.04);
      --border-glow: rgba(249, 115, 22, 0.2);
      
      /* Brand Accents (Vibrant Sunset Amber & Rose) */
      --brand-color: #f97316;
      --brand: linear-gradient(135deg, #f97316 0%, #ff4b91 100%);
      --brand-hover: linear-gradient(135deg, #ea580c 0%, #e11d48 100%);
      --brand-light: rgba(249, 115, 22, 0.12);
      --brand-glow: 0 8px 32px rgba(249, 115, 22, 0.3);
      
      /* Status */
      --success: #10b981;
      --success-glow: rgba(16, 185, 129, 0.2);
      --warning: #f59e0b;
      --warning-glow: rgba(245, 158, 11, 0.2);
      --danger: #f43f5e;
      --danger-glow: rgba(244, 63, 94, 0.2);

      /* Typography */
      --text: #f3f4f6;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      
      /* Settings */
      --radius: 16px;
      --radius-sm: 10px;
      --radius-lg: 24px;
      --shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
      --shadow-lg: 0 20px 50px rgba(0, 0, 0, 0.7);
      
      --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      background-image: var(--bg-gradient);
      background-attachment: fixed;
      color: var(--text);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    a {
      color: inherit;
      text-decoration: none;
      transition: var(--transition);
    }

    button {
      cursor: pointer;
      font-family: inherit;
      border: none;
      background: none;
      outline: none;
      transition: var(--transition);
    }

    input, textarea, select {
      font-family: inherit;
      outline: none;
      transition: var(--transition);
    }

    /* Scrollbar Styling */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 99px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.25);
    }

    /* Core Components */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 600;
      font-family: 'Plus Jakarta Sans', sans-serif;
      text-align: center;
      position: relative;
      overflow: hidden;
      z-index: 1;
    }

    .btn-primary {
      background: var(--brand);
      color: #fff;
      box-shadow: var(--brand-glow);
    }
    .btn-primary:hover {
      background: var(--brand-hover);
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(249, 115, 22, 0.45);
    }
    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-ghost {
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      border: 1px solid var(--border);
      backdrop-filter: blur(8px);
    }
    .btn-ghost:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.2);
      transform: translateY(-1px);
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }

    /* Glassmorphism card utilities */
    .glass-card {
      background: var(--surface);
      border: 1px solid var(--border);
      backdrop-filter: blur(16px);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    /* Chip/Badges */
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .chip-green {
      background: rgba(16, 185, 129, 0.15);
      color: var(--success);
      border: 1px solid rgba(16, 185, 129, 0.2);
    }
    .chip-yellow {
      background: rgba(245, 158, 11, 0.15);
      color: var(--warning);
      border: 1px solid rgba(245, 158, 11, 0.2);
    }
    .chip-red {
      background: rgba(244, 63, 94, 0.15);
      color: var(--danger);
      border: 1px solid rgba(244, 63, 94, 0.2);
    }
    .chip-orange {
      background: var(--brand-light);
      color: var(--brand-color);
      border: 1px solid rgba(249, 115, 22, 0.2);
    }

    /* Pulse Glow Animation */
    @keyframes pulse-emerald {
      0%, 100% {
        box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4);
      }
      50% {
        box-shadow: 0 0 0 8px rgba(16, 185, 129, 0);
      }
    }
    @keyframes pulse-amber {
      0%, 100% {
        box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.4);
      }
      50% {
        box-shadow: 0 0 0 8px rgba(245, 158, 11, 0);
      }
    }
    
    .pulse-dot-green {
      width: 8px;
      height: 8px;
      background: var(--success);
      border-radius: 50%;
      animation: pulse-emerald 2s infinite;
    }
    .pulse-dot-yellow {
      width: 8px;
      height: 8px;
      background: var(--warning);
      border-radius: 50%;
      animation: pulse-amber 2s infinite;
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
{% block body %}{% endblock %}
<script>
  // Shared Utilities
  function debounce(fn, ms) {
    let t;
    return (...a) => {
      clearTimeout(t);
      t = setTimeout(() => fn(...a), ms);
    };
  }

  // Format currency (INR)
  function formatRupee(n) {
    return '₹' + parseFloat(n).toLocaleString('en-IN', {
      minimumFractionDigits: 0,
      maximumFractionDigits: 2
    });
  }
</script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
