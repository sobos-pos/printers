{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soboss SuperAdmin — Log In</title>
    <link rel="stylesheet" href="{% static 'super_admin/css/style.css' %}">
</head>
<body>
    <div class="auth-wrapper">
        <div class="glass-panel auth-card">
            <h1 class="auth-logo">Soboss RESTAURANT OS</h1>
            <p class="auth-subtitle">Log in to your Owner / SuperAdmin account</p>

            {% if messages %}
                <ul class="messages">
                    {% for message in messages %}
                        <li class="alert {% if message.tags %}alert-{{ message.tags }}{% endif %}">
                            {{ message }}
                        </li>
                    {% endfor %}
                </ul>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label class="form-label" for="email">Username or Email</label>
                    <input class="form-control" type="text" id="email" name="email" required autocomplete="username" placeholder="enter admin username or email">
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input class="form-control" type="password" id="password" name="password" required autocomplete="current-password" placeholder="••••••••">
                </div>

                <button class="btn btn-primary" type="submit" style="width: 100%; margin-top: 1rem;">
                    Sign In to Dashboard
                </button>
            </form>
        </div>
    </div>
</body>
</html>
